<!-- Put this file in /var/ossec/etc/shared/default/agent.conf to update each agents configuration -->

<agent_config os="Windows">
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <syscheck>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">C:\Users</directories>
  </syscheck>
</agent_config>


<agent_config os="Linux">
  <localfile>
    <location>/var/log/audit/audit.log</location>
    <log_format>audit</log_format>
  </localfile>
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>

    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/var/www</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" whodata="yes" check_all="yes" report_changes="yes">/usr/bin</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore type="sregex">.log$</ignore>
  </syscheck>
</agent_config>
